<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chá de Bebê - Lista de Presentes</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: #fdf8f0;
      min-height: 100vh;
    }
    
    /* HEADER */
    .header {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      padding: 40px 20px;
      text-align: center;
    }
    
    .header h1 { font-size: 2.5rem; margin-bottom: 10px; }
    .header p { opacity: 0.9; font-size: 1.1rem; }
    
    .event-info {
      background: white;
      border-radius: 20px;
      padding: 20px;
      margin: -30px 20px 30px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.1);
      display: flex;
      flex-wrap: wrap;
      gap: 20px;
      justify-content: space-around;
    }
    
    .event-info-item {
      text-align: center;
    }
    
    .event-info-item .label {
      font-size: 12px;
      color: #999;
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    
    .event-info-item .value {
      font-size: 16px;
      font-weight: 600;
      color: #333;
      margin-top: 5px;
    }
    
    /* USER BAR */
    .user-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 15px 20px;
      background: white;
      border-bottom: 1px solid #eee;
    }
    
    .user-info {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    
    .user-avatar {
      width: 40px;
      height: 40px;
      background: #667eea;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-weight: bold;
    }
    
    .logout-btn {
      background: none;
      border: 1px solid #ddd;
      padding: 8px 16px;
      border-radius: 20px;
      cursor: pointer;
      color: #666;
    }
    
    .logout-btn:hover {
      background: #f0f0f0;
    }
    
    /* PRESENTES GRID */
    .presentes-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 24px;
      padding: 20px;
      max-width: 1400px;
      margin: 0 auto;
    }
    
    .presente-card {
      background: white;
      border-radius: 20px;
      overflow: hidden;
      box-shadow: 0 5px 20px rgba(0,0,0,0.08);
      transition: transform 0.3s, box-shadow 0.3s;
    }
    
    .presente-card:hover {
      transform: translateY(-5px);
      box-shadow: 0 15px 35px rgba(0,0,0,0.12);
    }
    
    .presente-card.esgotado {
      opacity: 0.6;
    }
    
    .presente-imagem {
      height: 200px;
      background: #f5f5f5;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }
    
    .presente-imagem img {
      max-width: 100%;
      max-height: 100%;
      object-fit: contain;
    }
    
    .presente-imagem-placeholder {
      font-size: 48px;
      color: #ccc;
    }
    
    .presente-info {
      padding: 20px;
    }
    
    .presente-titulo {
      font-size: 1.2rem;
      font-weight: 600;
      margin-bottom: 8px;
    }
    
    .presente-descricao {
      color: #666;
      font-size: 14px;
      margin-bottom: 12px;
      line-height: 1.5;
    }
    
    .presente-preco {
      font-size: 1.3rem;
      font-weight: 700;
      color: #667eea;
      margin-bottom: 8px;
    }
    
    .presente-quantidade {
      font-size: 13px;
      color: #999;
      margin-bottom: 15px;
    }
    
    .presente-quantidade span {
      font-weight: 600;
      color: #333;
    }
    
    .btn-escolher {
      width: 100%;
      padding: 12px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border: none;
      border-radius: 12px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.2s;
    }
    
    .btn-escolher:hover:not(:disabled) {
      transform: translateY(-2px);
    }
    
    .btn-escolher:disabled {
      background: #ccc;
      cursor: not-allowed;
    }
    
    .btn-pix {
      background: linear-gradient(135deg, #10b981 0%, #059669 100%);
      margin-top: 8px;
    }
    
    .escolhido-badge {
      background: #d1fae5;
      color: #10b981;
      padding: 6px 12px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 600;
      display: inline-block;
      margin-bottom: 12px;
    }
    
    /* COMENTÁRIOS */
    .comentarios-section {
      margin-top: 16px;
      padding-top: 16px;
      border-top: 1px solid #eee;
    }
    
    .comentarios-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
      cursor: pointer;
    }
    
    .comentarios-count {
      font-size: 13px;
      color: #667eea;
      font-weight: 500;
    }
    
    .comentarios-list {
      display: none;
      margin-top: 12px;
    }
    
    .comentarios-list.open {
      display: block;
    }
    
    .comentario-item {
      background: #f9f9f9;
      padding: 10px 12px;
      border-radius: 12px;
      margin-bottom: 10px;
    }
    
    .comentario-autor {
      font-weight: 600;
      font-size: 13px;
      margin-bottom: 4px;
    }
    
    .comentario-texto {
      font-size: 13px;
      color: #555;
      margin-bottom: 6px;
    }
    
    .comentario-reacoes {
      display: flex;
      gap: 8px;
      margin-top: 6px;
    }
    
    .reacao-btn {
      background: none;
      border: none;
      cursor: pointer;
      font-size: 14px;
      padding: 2px 6px;
      border-radius: 20px;
      background: #f0f0f0;
    }
    
    .reacao-btn.active {
      background: #667eea;
      color: white;
    }
    
    .novo-comentario {
      display: flex;
      gap: 8px;
      margin-top: 10px;
    }
    
    .novo-comentario input {
      flex: 1;
      padding: 10px;
      border: 1px solid #ddd;
      border-radius: 20px;
      outline: none;
    }
    
    .novo-comentario button {
      padding: 10px 16px;
      background: #667eea;
      color: white;
      border: none;
      border-radius: 20px;
      cursor: pointer;
    }
    
    /* MODAL */
    .modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0,0,0,0.5);
      align-items: center;
      justify-content: center;
      z-index: 1000;
    }
    
    .modal.open {
      display: flex;
    }
    
    .modal-content {
      background: white;
      border-radius: 24px;
      padding: 24px;
      max-width: 500px;
      width: 90%;
      max-height: 80vh;
      overflow-y: auto;
    }
    
    .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
    }
    
    .modal-close {
      background: none;
      border: none;
      font-size: 24px;
      cursor: pointer;
    }
    
    .opcao-presente {
      padding: 12px;
      border: 2px solid #eee;
      border-radius: 12px;
      margin-bottom: 12px;
      cursor: pointer;
      transition: all 0.2s;
    }
    
    .opcao-presente:hover {
      border-color: #667eea;
      background: #f8f7ff;
    }
    
    .opcao-presente.selected {
      border-color: #667eea;
      background: #f0edff;
    }
    
    .opcao-presente h4 {
      margin-bottom: 4px;
    }
    
    .opcao-presente p {
      font-size: 13px;
      color: #666;
    }
    
    /* TOAST */
    .toast {
      position: fixed;
      bottom: 20px;
      right: 20px;
      padding: 12px 20px;
      background: #333;
      color: white;
      border-radius: 12px;
      animation: slideIn 0.3s ease;
      z-index: 1100;
    }
    
    @keyframes slideIn {
      from { transform: translateX(100%); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    
    /* LOADING */
    .loading {
      text-align: center;
      padding: 40px;
      color: #999;
    }
    
    /* RESPONSIVE */
    @media (max-width: 640px) {
      .presentes-grid {
        grid-template-columns: 1fr;
        padding: 16px;
      }
      
      .header h1 { font-size: 1.8rem; }
    }
  </style>
</head>
<body>
<div id="app"></div>

<script src="auth.js"></script>
<script>
  let presentes = [];
  let configuracoes = {};
  let meuPresente = null;
  let comentariosCache = {};
  
  async function init() {
    await initAuth();
    
    if (!isLoggedIn()) {
      window.location.href = 'login.html';
      return;
    }
    
    await carregarConfiguracoes();
    await carregarPresentes();
    await carregarMinhaEscolha();
    renderizar();
  }
  
  async function carregarConfiguracoes() {
    const { data } = await supabase
      .from('configuracoes')
      .select('chave, valor');
    
    if (data) {
      data.forEach(c => { configuracoes[c.chave] = c.valor; });
    }
  }
  
  async function carregarPresentes() {
    const { data } = await supabase
      .from('presentes')
      .select('*')
      .order('ordem', { ascending: true });
    
    presentes = data || [];
  }
  
  async function carregarMinhaEscolha() {
    const user = getUser();
    if (!user) return;
    
    const { data } = await supabase
      .from('escolhas')
      .select('*, presentes(*)')
      .eq('usuario_id', user.id)
      .single();
    
    meuPresente = data;
  }
  
  async function carregarComentarios(presenteId) {
    if (comentariosCache[presenteId]) return comentariosCache[presenteId];
    
    const { data } = await supabase
      .from('comentarios')
      .select('*, perfis!inner(nome, avatar)')
      .eq('presente_id', presenteId)
      .order('criado_em', { ascending: false });
    
    comentariosCache[presenteId] = data || [];
    return comentariosCache[presenteId];
  }
  
  async function carregarReacoes(comentarioId) {
    const { data } = await supabase
      .from('reacoes')
      .select('emoji, usuario_id')
      .eq('comentario_id', comentarioId);
    
    const reacoes = {};
    data?.forEach(r => {
      if (!reacoes[r.emoji]) reacoes[r.emoji] = [];
      reacoes[r.emoji].push(r.usuario_id);
    });
    
    return reacoes;
  }
  
  async function adicionarComentario(presenteId, texto) {
    const user = getUser();
    if (!texto.trim()) return;
    
    const { error } = await supabase
      .from('comentarios')
      .insert({
        presente_id: presenteId,
        usuario_id: user.id,
        comentario: texto.trim()
      });
    
    if (!error) {
      delete comentariosCache[presenteId];
      toast('Comentário adicionado!', 'success');
      renderizar();
    } else {
      toast('Erro ao adicionar comentário', 'error');
    }
  }
  
  async function adicionarReacao(comentarioId, emoji) {
    const user = getUser();
    
    const { data: existing } = await supabase
      .from('reacoes')
      .select('id')
      .eq('comentario_id', comentarioId)
      .eq('usuario_id', user.id)
      .eq('emoji', emoji)
      .single();
    
    if (existing) {
      await supabase
        .from('reacoes')
        .delete()
        .eq('id', existing.id);
    } else {
      await supabase
        .from('reacoes')
        .insert({
          comentario_id: comentarioId,
          usuario_id: user.id,
          emoji: emoji
        });
    }
    
    delete comentariosCache[Object.keys(comentariosCache).find(k => 
      comentariosCache[k]?.some(c => c.id === comentarioId)
    )];
    
    renderizar();
  }
  
  async function escolherPresente(presenteId, tipo, valor = null) {
    const user = getUser();
    const presente = presentes.find(p => p.id === presenteId);
    
    if (!presente || presente.quantidade_restante <= 0) {
      toast('Este presente já está esgotado!', 'error');
      return;
    }
    
    if (meuPresente) {
      toast('Você já escolheu um presente!', 'warning');
      return;
    }
    
    const escolha = {
      presente_id: presenteId,
      usuario_id: user.id,
      tipo_pagamento: tipo,
      quantidade: 1
    };
    
    if (valor) escolha.valor = valor;
    
    const { error } = await supabase
      .from('escolhas')
      .insert(escolha);
    
    if (!error) {
      toast(`Presente escolhido com sucesso! 🎉`, 'success');
      await carregarPresentes();
      await carregarMinhaEscolha();
      renderizar();
    } else {
      toast('Erro ao escolher presente', 'error');
    }
  }
  
  function formatarPreco(valor) {
    return new Intl.NumberFormat('pt-BR', {
      style: 'currency',
      currency: 'BRL'
    }).format(valor || 0);
  }
  
  function toast(msg, type = 'info') {
    const toast = document.createElement('div');
    toast.className = 'toast';
    toast.textContent = msg;
    document.body.appendChild(toast);
    setTimeout(() => toast.remove(), 3000);
  }
  
  async function logoutClick() {
    await logout();
    window.location.href = 'login.html';
  }
  
  function renderizar() {
    const user = getUser();
    const isAdminUser = isAdmin();
    
    document.getElementById('app').innerHTML = `
      <div class="user-bar">
        <div class="user-info">
          <div class="user-avatar">${user.perfil?.nome?.charAt(0) || 'U'}</div>
          <div>Olá, <strong>${user.perfil?.nome || user.email}</strong></div>
          ${meuPresente ? `<div class="escolhido-badge">🎁 ${meuPresente.presentes?.titulo || 'Presente escolhido'}</div>` : ''}
        </div>
        <div>
          ${isAdminUser ? `<button class="logout-btn" onclick="window.location.href='admin.html'">⚙️ Admin</button>` : ''}
          <button class="logout-btn" onclick="logoutClick()">🚪 Sair</button>
        </div>
      </div>
      
      <div class="header">
        <h1>${configuracoes.evento_titulo || 'Chá de Bebê'}</h1>
        <p>${configuracoes.evento_descricao || 'Venha celebrar conosco!'}</p>
      </div>
      
      <div class="event-info">
        <div class="event-info-item">
          <div class="label">📅 DATA</div>
          <div class="value">${configuracoes.evento_data || 'A definir'}</div>
        </div>
        <div class="event-info-item">
          <div class="label">📍 LOCAL</div>
          <div class="value">${configuracoes.evento_local || 'A definir'}</div>
        </div>
        <div class="event-info-item">
          <div class="label">💰 PIX</div>
          <div class="value">${configuracoes.pix_chave || 'Não definido'}</div>
        </div>
      </div>
      
      <div class="presentes-grid">
        ${presentes.length === 0 ? '<div class="loading">🎁 Carregando presentes...</div>' : 
          presentes.map(p => renderizarPresente(p)).join('')}
      </div>
    `;
    
    // Adicionar eventos após renderizar
    document.querySelectorAll('.toggle-comentarios').forEach(btn => {
      btn.onclick = () => {
        const id = btn.dataset.id;
        const list = document.getElementById(`comentarios-${id}`);
        if (list) list.classList.toggle('open');
      };
    });
    
    document.querySelectorAll('.btn-comentar').forEach(btn => {
      btn.onclick = () => {
        const id = btn.dataset.id;
        const input = document.getElementById(`comentario-input-${id}`);
        if (input) adicionarComentario(id, input.value);
      };
    });
    
    document.querySelectorAll('.btn-reacao').forEach(btn => {
      btn.onclick = () => {
        const comentarioId = btn.dataset.comentarioId;
        const emoji = btn.dataset.emoji;
        adicionarReacao(comentarioId, emoji);
      };
    });
  }
  
  async function renderizarPresente(p) {
    const comentarios = await carregarComentarios(p.id);
    const user = getUser();
    const isAdminUser = isAdmin();
    const esgotado = p.quantidade_restante <= 0;
    const jaEscolhi = meuPresente?.presente_id === p.id;
    
    // Renderizar comentários com reações
    const comentariosHtml = await Promise.all(comentarios.map(async c => {
      const reacoes = await carregarReacoes(c.id);
      const reacoesHtml = Object.entries(reacoes).map(([emoji, usuarios]) => {
        const userReagiu = usuarios.includes(user.id);
        return `
          <button class="reacao-btn ${userReagiu ? 'active' : ''}" 
                  data-comentario-id="${c.id}" 
                  data-emoji="${emoji}"
                  onclick="window.adicionarReacao('${c.id}', '${emoji}')">
            ${emoji} ${usuarios.length}
          </button>
        `;
      }).join('');
      
      return `
        <div class="comentario-item">
          <div class="comentario-autor">${c.perfis?.nome || 'Anônimo'}</div>
          <div class="comentario-texto">${escapeHtml(c.comentario)}</div>
          <div class="comentario-reacoes">
            ${reacoesHtml}
          </div>
        </div>
      `;
    }));
    
    return `
      <div class="presente-card ${esgotado ? 'esgotado' : ''}">
        <div class="presente-imagem">
          ${p.imagem_base64 ? 
            `<img src="${p.imagem_base64}" alt="${p.titulo}">` : 
            `<div class="presente-imagem-placeholder">🎁</div>`
          }
        </div>
        <div class="presente-info">
          ${jaEscolhi ? '<div class="escolhido-badge">✅ Você escolheu este presente!</div>' : ''}
          <h3 class="presente-titulo">${escapeHtml(p.titulo)}</h3>
          <p class="presente-descricao">${escapeHtml(p.descricao || '')}</p>
          ${p.preco ? `<div class="presente-preco">${formatarPreco(p.preco)}</div>` : ''}
          <div class="presente-quantidade">
            ${p.quantidade_restante > 0 ? 
              `📦 Restam: <span>${p.quantidade_restante}</span> de ${p.quantidade_max}` : 
              '🎁 Presente já escolhido!'
            }
          </div>
          
          ${!jaEscolhi && !esgotado && !meuPresente ? `
            <button class="btn-escolher" onclick="abrirModalEscolha('${p.id}', '${p.titulo}', ${p.preco || 0})">
              🎁 Quero este presente
            </button>
            ${configuracoes.pix_chave ? `
              <button class="btn-escolher btn-pix" onclick="escolherPresente('${p.id}', 'pix')">
                💰 Contribuir com PIX (${formatarPreco(p.preco || 0)})
              </button>
            ` : ''}
          ` : ''}
          
          ${meuPresente && meuPresente.presente_id === p.id ? `
            <div style="text-align:center; padding:12px; background:#f0f0f0; border-radius:12px; margin-top:12px;">
              🎉 Você escolheu este presente!
              ${meuPresente.tipo_pagamento === 'pix' ? '<br>💳 Pagamento via PIX' : ''}
            </div>
          ` : ''}
          
          <div class="comentarios-section">
            <div class="comentarios-header toggle-comentarios" data-id="${p.id}">
              <span>💬 Comentários (${comentarios.length})</span>
              <span class="comentarios-count">▼</span>
            </div>
            <div class="comentarios-list" id="comentarios-${p.id}">
              ${comentariosHtml.join('')}
              <div class="novo-comentario">
                <input type="text" id="comentario-input-${p.id}" placeholder="Escreva um comentário...">
                <button class="btn-comentar" data-id="${p.id}">Enviar</button>
              </div>
            </div>
          </div>
        </div>
      </div>
    `;
  }
  
  function abrirModalEscolha(presenteId, titulo, preco) {
    const modal = document.createElement('div');
    modal.className = 'modal open';
    modal.innerHTML = `
      <div class="modal-content">
        <div class="modal-header">
          <h3>Escolher Presente</h3>
          <button class="modal-close" onclick="this.closest('.modal').remove()">×</button>
        </div>
        <p>Como você quer contribuir com <strong>${escapeHtml(titulo)}</strong>?</p>
        <div style="margin: 20px 0;">
          <div class="opcao-presente" onclick="escolherPresente('${presenteId}', 'presente'); document.querySelector('.modal')?.remove()">
            <h4>🎁 Comprar o presente</h4>
            <p>${formatarPreco(preco)} - O item será marcado como comprado por você</p>
          </div>
          ${configuracoes.pix_chave ? `
          <div class="opcao-presente" onclick="escolherPresente('${presenteId}', 'pix'); document.querySelector('.modal')?.remove()">
            <h4>💰 Contribuir via PIX</h4>
            <p>Chave PIX: ${configuracoes.pix_chave}</p>
            <p style="font-size:12px; color:#666;">Após o pagamento, marcaremos sua contribuição</p>
          </div>
          ` : ''}
        </div>
      </div>
    `;
    document.body.appendChild(modal);
  }
  
  function escapeHtml(str) {
    if (!str) return '';
    return str
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;')
      .replace(/'/g, '&#39;');
  }
  
  // Expor funções globalmente
  window.escolherPresente = escolherPresente;
  window.adicionarReacao = adicionarReacao;
  window.abrirModalEscolha = abrirModalEscolha;
  window.logoutClick = logoutClick;
  
  init();
</script>
</body>
</html>
