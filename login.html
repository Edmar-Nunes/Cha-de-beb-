<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login | Chá de Bebê</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    
    .container {
      background: white;
      border-radius: 24px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
      overflow: hidden;
      max-width: 450px;
      width: 100%;
    }
    
    .tabs {
      display: flex;
      border-bottom: 2px solid #f0f0f0;
    }
    
    .tab {
      flex: 1;
      text-align: center;
      padding: 18px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      background: #fafafa;
      color: #666;
      transition: all 0.3s;
      border: none;
    }
    
    .tab.active {
      background: white;
      color: #667eea;
      border-bottom: 2px solid #667eea;
    }
    
    .form-panel {
      padding: 32px;
      display: none;
    }
    
    .form-panel.active {
      display: block;
      animation: fadeIn 0.3s ease;
    }
    
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    
    .form-group {
      margin-bottom: 20px;
    }
    
    .form-group label {
      display: block;
      margin-bottom: 8px;
      font-weight: 500;
      color: #333;
    }
    
    .form-group input {
      width: 100%;
      padding: 12px 16px;
      border: 2px solid #e0e0e0;
      border-radius: 12px;
      font-size: 15px;
      transition: all 0.3s;
      outline: none;
    }
    
    .form-group input:focus {
      border-color: #667eea;
      box-shadow: 0 0 0 3px rgba(102,126,234,0.1);
    }
    
    .btn {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border: none;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.2s, opacity 0.2s;
    }
    
    .btn:hover {
      transform: translateY(-2px);
      opacity: 0.95;
    }
    
    .btn:active {
      transform: translateY(0);
    }
    
    .error-message {
      background: #fee2e2;
      color: #dc2626;
      padding: 12px;
      border-radius: 12px;
      margin-bottom: 20px;
      font-size: 14px;
      display: none;
    }
    
    .success-message {
      background: #d1fae5;
      color: #10b981;
      padding: 12px;
      border-radius: 12px;
      margin-bottom: 20px;
      font-size: 14px;
      display: none;
    }
    
    .logo {
      text-align: center;
      padding: 32px 32px 0;
    }
    
    .logo h1 {
      font-size: 28px;
      color: #667eea;
    }
    
    .logo p {
      color: #666;
      margin-top: 8px;
    }
  </style>
</head>
<body>
<div class="container">
  <div class="logo">
    <h1>🎁 Chá de Bebê</h1>
    <p>Faça login ou cadastre-se para escolher seu presente</p>
  </div>
  
  <div class="tabs">
    <button class="tab active" onclick="showTab('login')">Entrar</button>
    <button class="tab" onclick="showTab('cadastro')">Cadastrar</button>
  </div>
  
  <div id="loginPanel" class="form-panel active">
    <div id="loginError" class="error-message"></div>
    <div class="form-group">
      <label>E-mail</label>
      <input type="email" id="loginEmail" placeholder="seu@email.com">
    </div>
    <div class="form-group">
      <label>Senha</label>
      <input type="password" id="loginSenha" placeholder="••••••••">
    </div>
    <button class="btn" onclick="fazerLogin()">Entrar</button>
  </div>
  
  <div id="cadastroPanel" class="form-panel">
    <div id="cadastroError" class="error-message"></div>
    <div id="cadastroSuccess" class="success-message"></div>
    <div class="form-group">
      <label>Nome completo</label>
      <input type="text" id="cadastroNome" placeholder="Seu nome">
    </div>
    <div class="form-group">
      <label>E-mail</label>
      <input type="email" id="cadastroEmail" placeholder="seu@email.com">
    </div>
    <div class="form-group">
      <label>Telefone</label>
      <input type="tel" id="cadastroTelefone" placeholder="(11) 99999-9999">
    </div>
    <div class="form-group">
      <label>Senha</label>
      <input type="password" id="cadastroSenha" placeholder="••••••••">
    </div>
    <div class="form-group">
      <label>Confirmar senha</label>
      <input type="password" id="cadastroConfirmar" placeholder="••••••••">
    </div>
    <button class="btn" onclick="fazerCadastro()">Cadastrar</button>
  </div>
</div>

<script src="auth.js"></script>
<script>
  // Inicializar autenticação
  initAuth().then(() => {
    // Verificar se já está logado
    if (isLoggedIn()) {
      window.location.href = 'index.html';
    }
  });
  
  function showTab(tab) {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.form-panel').forEach(p => p.classList.remove('active'));
    
    if (tab === 'login') {
      document.querySelector('.tab:first-child').classList.add('active');
      document.getElementById('loginPanel').classList.add('active');
    } else {
      document.querySelector('.tab:last-child').classList.add('active');
      document.getElementById('cadastroPanel').classList.add('active');
    }
  }
  
  async function fazerLogin() {
    const email = document.getElementById('loginEmail').value;
    const senha = document.getElementById('loginSenha').value;
    const errorDiv = document.getElementById('loginError');
    
    if (!email || !senha) {
      errorDiv.textContent = 'Preencha todos os campos';
      errorDiv.style.display = 'block';
      return;
    }
    
    errorDiv.style.display = 'none';
    
    const result = await login(email, senha);
    
    if (result.success) {
      window.location.href = 'index.html';
    } else {
      errorDiv.textContent = result.error;
      errorDiv.style.display = 'block';
    }
  }
  
  async function fazerCadastro() {
    const nome = document.getElementById('cadastroNome').value;
    const email = document.getElementById('cadastroEmail').value;
    const telefone = document.getElementById('cadastroTelefone').value;
    const senha = document.getElementById('cadastroSenha').value;
    const confirmar = document.getElementById('cadastroConfirmar').value;
    
    const errorDiv = document.getElementById('cadastroError');
    const successDiv = document.getElementById('cadastroSuccess');
    
    errorDiv.style.display = 'none';
    successDiv.style.display = 'none';
    
    if (!nome || !email || !telefone || !senha) {
      errorDiv.textContent = 'Preencha todos os campos';
      errorDiv.style.display = 'block';
      return;
    }
    
    if (senha !== confirmar) {
      errorDiv.textContent = 'As senhas não coincidem';
      errorDiv.style.display = 'block';
      return;
    }
    
    if (senha.length < 6) {
      errorDiv.textContent = 'A senha deve ter pelo menos 6 caracteres';
      errorDiv.style.display = 'block';
      return;
    }
    
    const result = await cadastrar(nome, email, telefone, senha);
    
    if (result.success) {
      successDiv.textContent = 'Cadastro realizado com sucesso! Redirecionando...';
      successDiv.style.display = 'block';
      
      setTimeout(() => {
        window.location.href = 'index.html';
      }, 1500);
    } else {
      errorDiv.textContent = result.error;
      errorDiv.style.display = 'block';
    }
  }
</script>
</body>
</html>
