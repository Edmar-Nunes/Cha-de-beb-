<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Entrar | Chá de Bebê do Enzo</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;0,700;1,500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --cream:   #fdf8f0;
      --sand:    #f2e8d5;
      --rose:    #d4826a;
      --rose-dk: #b36650;
      --sage:    #6b8f71;
      --ink:     #1c1c1e;
      --muted:   #7a7a7a;
      --border:  #e8ddd0;
      --white:   #ffffff;
      --radius:  14px;
      --shadow:  0 8px 40px rgba(28, 28, 30, 0.10);
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--cream);
      min-height: 100vh;
      display: grid;
      grid-template-columns: 1fr 1fr;
    }

    /* ── Left panel ── */
    .left-panel {
      background: var(--sand);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 60px 48px;
      position: relative;
      overflow: hidden;
    }

    .left-panel::before {
      content: '';
      position: absolute;
      width: 420px; height: 420px;
      background: radial-gradient(circle, rgba(212,130,106,0.18) 0%, transparent 70%);
      top: -80px; right: -80px;
      border-radius: 50%;
    }

    .left-panel::after {
      content: '';
      position: absolute;
      width: 320px; height: 320px;
      background: radial-gradient(circle, rgba(107,143,113,0.15) 0%, transparent 70%);
      bottom: -60px; left: -60px;
      border-radius: 50%;
    }

    .brand {
      position: relative;
      z-index: 1;
      text-align: center;
    }

    .brand-icon {
      font-size: 64px;
      display: block;
      margin-bottom: 24px;
      animation: float 3s ease-in-out infinite;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-8px); }
    }

    .brand h1 {
      font-family: 'Playfair Display', serif;
      font-size: 2.8rem;
      font-weight: 700;
      color: var(--ink);
      line-height: 1.15;
      margin-bottom: 16px;
    }

    .brand h1 em {
      font-style: italic;
      color: var(--rose);
    }

    .brand p {
      color: var(--muted);
      font-size: 1rem;
      font-weight: 300;
      line-height: 1.7;
      max-width: 320px;
    }

    .event-pills {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 32px;
      justify-content: center;
    }

    .pill {
      background: var(--white);
      border: 1px solid var(--border);
      border-radius: 100px;
      padding: 8px 18px;
      font-size: 13px;
      color: var(--ink);
      font-weight: 400;
    }

    /* ── Right panel ── */
    .right-panel {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 48px 40px;
    }

    .form-box {
      width: 100%;
      max-width: 420px;
    }

    /* Tabs */
    .tab-row {
      display: flex;
      gap: 0;
      background: var(--sand);
      border-radius: var(--radius);
      padding: 4px;
      margin-bottom: 36px;
    }

    .tab-btn {
      flex: 1;
      padding: 11px 16px;
      border: none;
      background: transparent;
      border-radius: calc(var(--radius) - 3px);
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      font-weight: 500;
      color: var(--muted);
      cursor: pointer;
      transition: all 0.2s;
    }

    .tab-btn.active {
      background: var(--white);
      color: var(--ink);
      box-shadow: 0 2px 8px rgba(28,28,30,0.08);
    }

    /* Fields */
    .field { margin-bottom: 18px; }

    .field label {
      display: block;
      font-size: 13px;
      font-weight: 500;
      color: var(--ink);
      margin-bottom: 7px;
    }

    .field input {
      width: 100%;
      padding: 13px 16px;
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      font-family: 'DM Sans', sans-serif;
      font-size: 15px;
      color: var(--ink);
      background: var(--white);
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    .field input:focus {
      border-color: var(--rose);
      box-shadow: 0 0 0 3px rgba(212,130,106,0.12);
    }

    .field input::placeholder { color: #c0b8af; }

    /* Button */
    .btn-primary {
      width: 100%;
      padding: 15px;
      background: var(--rose);
      color: var(--white);
      border: none;
      border-radius: var(--radius);
      font-family: 'DM Sans', sans-serif;
      font-size: 15px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.2s, transform 0.15s;
      margin-top: 4px;
    }

    .btn-primary:hover { background: var(--rose-dk); transform: translateY(-1px); }
    .btn-primary:active { transform: translateY(0); }
    .btn-primary:disabled { background: #c0b8af; cursor: not-allowed; transform: none; }

    /* Alerts */
    .alert {
      padding: 13px 16px;
      border-radius: var(--radius);
      font-size: 14px;
      margin-bottom: 20px;
      display: none;
    }

    .alert-error {
      background: #fef2f2;
      color: #b91c1c;
      border: 1px solid #fecaca;
    }

    .alert-success {
      background: #f0fdf4;
      color: #15803d;
      border: 1px solid #bbf7d0;
    }

    /* Form panels */
    .panel { display: none; }
    .panel.active { display: block; animation: slideIn 0.25s ease; }

    @keyframes slideIn {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* Responsive */
    @media (max-width: 768px) {
      body { grid-template-columns: 1fr; }
      .left-panel { padding: 40px 24px; min-height: auto; }
      .brand h1 { font-size: 2rem; }
      .right-panel { padding: 32px 24px; }
    }
  </style>
</head>
<body>

<div class="left-panel">
  <div class="brand">
    <span class="brand-icon">🍼</span>
    <h1>Chá de Bebê<br>do <em>Enzo</em></h1>
    <p>Escolha um presente especial para celebrar a chegada do nosso pequenininho.</p>
    <div class="event-pills">
      <span class="pill">📅 15 de Maio, 2026</span>
      <span class="pill">📍 São Paulo</span>
      <span class="pill">🎁 Lista de presentes</span>
    </div>
  </div>
</div>

<div class="right-panel">
  <div class="form-box">

    <div class="tab-row">
      <button class="tab-btn active" onclick="mostrarPanel('login', this)">Entrar</button>
      <button class="tab-btn" onclick="mostrarPanel('cadastro', this)">Criar conta</button>
    </div>

    <!-- Login -->
    <div id="panel-login" class="panel active">
      <div id="loginError" class="alert alert-error"></div>
      <div class="field">
        <label>E-mail</label>
        <input type="email" id="loginEmail" placeholder="seu@email.com" autocomplete="email">
      </div>
      <div class="field">
        <label>Senha</label>
        <input type="password" id="loginSenha" placeholder="••••••••" autocomplete="current-password"
               onkeydown="if(event.key==='Enter') fazerLogin()">
      </div>
      <button class="btn-primary" id="btnLogin" onclick="fazerLogin()">Entrar</button>
    </div>

    <!-- Cadastro -->
    <div id="panel-cadastro" class="panel">
      <div id="cadastroError" class="alert alert-error"></div>
      <div id="cadastroSuccess" class="alert alert-success"></div>
      <div class="field">
        <label>Nome completo</label>
        <input type="text" id="cadastroNome" placeholder="Seu nome" autocomplete="name">
      </div>
      <div class="field">
        <label>E-mail</label>
        <input type="email" id="cadastroEmail" placeholder="seu@email.com" autocomplete="email">
      </div>
      <div class="field">
        <label>Telefone</label>
        <input type="tel" id="cadastroTelefone" placeholder="(11) 99999-9999" autocomplete="tel">
      </div>
      <div class="field">
        <label>Senha</label>
        <input type="password" id="cadastroSenha" placeholder="Mínimo 6 caracteres">
      </div>
      <div class="field">
        <label>Confirmar senha</label>
        <input type="password" id="cadastroConfirmar" placeholder="••••••••"
               onkeydown="if(event.key==='Enter') fazerCadastro()">
      </div>
      <button class="btn-primary" id="btnCadastro" onclick="fazerCadastro()">Criar conta</button>
    </div>

  </div>
</div>

<script src="auth.js"></script>
<script>
  initAuth().then(() => {
    if (isLoggedIn()) window.location.href = 'index.html';
  });

  function mostrarPanel(id, btn) {
    document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.getElementById('panel-' + id).classList.add('active');
    btn.classList.add('active');
  }

  function setLoading(btnId, loading) {
    const btn = document.getElementById(btnId);
    btn.disabled = loading;
    btn.textContent = loading ? 'Aguarde...' : (btnId === 'btnLogin' ? 'Entrar' : 'Criar conta');
  }

  async function fazerLogin() {
    const email = document.getElementById('loginEmail').value.trim();
    const senha = document.getElementById('loginSenha').value;
    const err   = document.getElementById('loginError');

    err.style.display = 'none';
    if (!email || !senha) { err.textContent = 'Preencha todos os campos.'; err.style.display = 'block'; return; }

    setLoading('btnLogin', true);
    const result = await login(email, senha);
    setLoading('btnLogin', false);

    if (result.success) {
      window.location.href = 'index.html';
    } else {
      err.textContent = result.error;
      err.style.display = 'block';
    }
  }

  async function fazerCadastro() {
    const nome     = document.getElementById('cadastroNome').value.trim();
    const email    = document.getElementById('cadastroEmail').value.trim();
    const telefone = document.getElementById('cadastroTelefone').value.trim();
    const senha    = document.getElementById('cadastroSenha').value;
    const confirmar= document.getElementById('cadastroConfirmar').value;
    const err      = document.getElementById('cadastroError');
    const ok       = document.getElementById('cadastroSuccess');

    err.style.display = 'none';
    ok.style.display  = 'none';

    if (!nome || !email || !telefone || !senha) {
      err.textContent = 'Preencha todos os campos.'; err.style.display = 'block'; return;
    }
    if (senha !== confirmar) {
      err.textContent = 'As senhas não coincidem.'; err.style.display = 'block'; return;
    }
    if (senha.length < 6) {
      err.textContent = 'A senha deve ter pelo menos 6 caracteres.'; err.style.display = 'block'; return;
    }

    setLoading('btnCadastro', true);
    const result = await cadastrar(nome, email, telefone, senha);
    setLoading('btnCadastro', false);

    if (result.success) {
      ok.textContent = 'Conta criada com sucesso! Redirecionando...';
      ok.style.display = 'block';
      setTimeout(() => window.location.href = 'index.html', 1500);
    } else {
      err.textContent = result.error;
      err.style.display = 'block';
    }
  }
</script>
</body>
</html>
